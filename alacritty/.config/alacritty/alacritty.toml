# Catppuccin Mocha — встроенные цвета
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.cursor]
text = "#cdd6f4"
cursor = "#f5e0dc"

[colors.selection]
text = "CellBackground"
background = "#45475a"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#cdd6f4"

[window]
padding.x = 12
padding.y = 12
opacity = 0.95

[font]
normal  = { family = "FiraCode Nerd Font Mono", style = "Regular" }
bold    = { family = "FiraCode Nerd Font Mono", style = "Bold" }
italic  = { family = "FiraCode Nerd Font Mono", style = "Italic" }
size    = 12.0

[terminal]
shell.program = "/bin/zsh"

[cursor]
style.shape = "Beam"

