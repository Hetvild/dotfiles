# В начало конфига, до других bind
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind '-' split-window -v -c "#{pane_current_path}"   # разделить по горизонтальной черте (панель снизу)
bind '|' split-window -h -c "#{pane_current_path}"   # разделить по вертикальной черте (панель справа)


# 1. Базовые вещи
set -g mouse on
set -sg escape-time 10
set -g history-limit 50000

set -g base-index 1
setw -g pane-base-index 1

set -g default-terminal "screen-256color"
setw -g mode-keys vi
# 2. Перезагрузка конфига
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# 3. Удобный ресайз панелей (Vim-like)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
